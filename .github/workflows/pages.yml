name: Deploy countdown to GitHub Pages

# Publishes the countdown app so it has a permanent public URL:
#   https://sultanovaz.github.io/kimscrafts-theme/
# Manual only for now. The repo is private, so GitHub Pages can't publish until
# it's made public (or put on a paid plan). Once that's done, run this workflow
# from the Actions tab (or re-enable the push trigger below) to publish.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload countdown app as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: countdown

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
