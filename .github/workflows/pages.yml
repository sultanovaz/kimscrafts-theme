name: Deploy countdown to GitHub Pages

# Publishes the countdown app so it has a permanent public URL:
#   https://sultanovaz.github.io/kimscrafts-theme/
on:
  push:
    branches:
      - claude/countdown-goal-tracker-1cqkul
      - main
    paths:
      - "countdown/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload countdown app as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: countdown

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
